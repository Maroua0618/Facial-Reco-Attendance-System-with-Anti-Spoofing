name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [nour]

jobs:
  frontend:
    name: Frontend — lint, typecheck, unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      MOCK_AI: "true"
      SUPABASE_URL: "https://placeholder.supabase.co"
      SUPABASE_SERVICE_KEY: "placeholder-key"
      FACE_THRESHOLD: "0.5"
      SPOOF_THRESHOLD: "0.70"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install --quiet \
            pytest \
            pytest-asyncio \
            anyio \
            fastapi \
            python-dotenv \
            numpy \
            supabase

      - name: Run tests
        run: pytest tests/ -v
